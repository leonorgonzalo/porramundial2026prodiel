<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porra Mundial 2026 Prodiel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--surface:#f4f7f4;--surface2:#e8f0e8;--border:#c8d8c8;
  --text:#0f2318;--text2:#3a5a3a;--text3:#7a9a7a;
  --accent:#1a3a6b;--accent2:#2ea84a;
  --gold:#f59e0b;--silver:#94a3b8;--bronze:#cd7c3a;
}
html{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
body{max-width:700px;margin:0 auto;padding:0 14px 80px}
h1{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;line-height:1.1}
h2{font-size:17px;font-weight:600;margin-bottom:10px}
h3{font-size:14px;font-weight:600;margin-bottom:6px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;transition:.15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn-sm{padding:6px 11px;font-size:13px}
.btn-ghost{border-color:transparent;color:var(--text2)}
.btn-ghost:hover{color:var(--text);border-color:var(--border)}
.btn-danger{border-color:#7f1d1d;color:#ef4444}
.btn-danger:hover{background:#1c0a0a}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:12px}
input,select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--text);font-size:14px;font-family:'Inter',sans-serif;transition:.15s}
input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,58,107,.15)}
input::placeholder{color:var(--text3)}
select option{background:var(--surface)}
label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;letter-spacing:.4px;text-transform:uppercase}
.form-group{margin-bottom:12px}
.tab-bar{display:flex;gap:2px;overflow-x:auto;border-bottom:1px solid var(--border);margin-bottom:14px;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;font-family:'Inter',sans-serif}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MATCH ROW */
.match-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.match-row:last-child{border-bottom:none}
.match-name{font-size:13px;color:var(--text)}
.radio-group{display:flex;gap:4px}
.radio-btn{width:34px;height:29px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;background:transparent;color:var(--text3);transition:.15s;font-family:'Inter',sans-serif}
.radio-btn:hover{border-color:var(--accent);color:var(--accent)}
.radio-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.radio-btn.correct{background:#16a34a;border-color:#16a34a;color:#fff}

/* GROUP HEADER */
.group-block{margin-bottom:20px}
.group-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--accent);padding:8px 0 4px;border-top:1px solid var(--border)}

/* STANDINGS TABLE */
.standings{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
.standings th{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);padding:4px 6px;text-align:center;border-bottom:1px solid var(--border)}
.standings th.left{text-align:left}
.standings td{padding:5px 6px;text-align:center;border-bottom:1px solid var(--border)}
.standings td.left{text-align:left;font-weight:500}
.standings tr:last-child td{border-bottom:none}
.standings tr.pos1 td{color:var(--text);background:rgba(26,58,107,.1)}
.standings tr.pos1 td.pos-cell{color:var(--accent);font-weight:700}
.standings tr.pos2 td{color:var(--text);background:rgba(26,58,107,.05)}
.standings tr.pos2 td.pos-cell{color:#60a5fa;font-weight:700}
.standings tr.pos3 td{color:var(--text2)}
.standings tr.pos4 td{color:var(--text3)}
.standings td.pos-cell{font-weight:600;font-size:12px}

/* BRACKET MATCH */
.bm{border:1px solid var(--border);border-radius:8px;background:var(--surface2);margin-bottom:6px;overflow:hidden}
.bm.esp{border-color:rgba(196,157,52,.5)}
.bm-slot{padding:6px 10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;min-height:30px;cursor:pointer;transition:.1s}
.bm-slot:hover{background:var(--surface)}
.bm-slot.disabled{opacity:.4;cursor:default;pointer-events:none}
.bm-slot:first-child{border-bottom:1px solid var(--border)}
.bm-slot .dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:.15s}
.bm-slot .dot.w{background:var(--accent)}
.bm-slot .tn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bm-slot .tn.empty{color:var(--text3);font-style:italic;font-size:12px}
.bm-slot .lbl{font-size:11px;color:var(--text3);flex-shrink:0}
/* CORRECT (resultado acertado, con quinielas bloqueadas) */
.bm-slot.correct{background:rgba(34,197,94,.15)}
.bm-slot.correct .tn{color:#4ade80;font-weight:700}
.bm-slot.correct .dot{background:#22c55e}
input.correct,select.correct{border-color:#16a34a;color:#4ade80;background:rgba(34,197,94,.08)}
.lock-banner{background:rgba(26,58,107,.1);border:1px solid rgba(26,58,107,.35);color:#1a3a6b;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.lock-banner b{color:#e0e7ff}

/* POOL SELECTOR */
.pool-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:6px}
.pool-btn{padding:7px 6px;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;background:transparent;color:var(--text2);transition:.15s;text-align:left;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px}
.pool-btn:hover{border-color:var(--accent);color:var(--accent)}
.pool-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.pool-btn .pdot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* MISC */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:500}
.tag-green{background:rgba(34,197,94,.15);color:#4ade80}
.tag-amber{background:rgba(245,158,11,.15);color:var(--gold)}
.status-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.status-row:last-child{border-bottom:none}
.msg-ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:10px}
.msg-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:8px}
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
.nav-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.admin-badge{background:rgba(46,168,74,.15);color:var(--accent2);font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600}
.count-pill{background:rgba(59,130,246,.1);color:#93c5fd;border-radius:20px;font-size:12px;font-weight:500;padding:3px 10px}
.sticky-tabs{position:sticky;top:0;background:var(--bg);z-index:10;padding:6px 0 0}
.divider{height:1px;background:var(--border);margin:14px 0}
.hero{padding:20px 0 14px;border-bottom:1px solid var(--border);margin-bottom:18px}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between}
.hero-sub{color:var(--text2);font-size:13px;margin-top:2px}
.rank-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px}
.rank-row:hover{background:var(--surface2)}
.rank-num{font-size:16px;font-weight:700;width:26px;text-align:center;color:var(--text3);font-family:'Bebas Neue',sans-serif}
.rank-num.gold{color:var(--gold)}.rank-num.silver{color:var(--silver)}.rank-num.bronze{color:var(--bronze)}
.rank-name{flex:1;font-weight:500}
.rank-pts{font-size:20px;font-weight:700;color:var(--accent);font-family:'Bebas Neue',sans-serif}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:3px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px}
.top3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.top3-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center}
.top3-card.first{border-color:var(--gold)}
.top3-card .medal{font-size:22px;margin-bottom:3px}
.top3-card .pname{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top3-card .ppts{font-size:22px;font-weight:700;color:var(--accent);font-family:'Bebas Neue',sans-serif}
.section-ronda{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--text2);padding:10px 0 6px;border-top:1px solid var(--border);margin-top:8px}
.tercero-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.tercero-row:last-child{border-bottom:none}
.tercero-row .tlabel{font-size:13px;color:var(--text2);flex:1}
.tercero-row select{max-width:200px;flex:1}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATOS: orden exacto del Excel ──
const GRUPOS_ORDER=['A','B','C','D','E','F','G','H','I','J','K','L'];
const GRUPOS={
  A:['MEXICO','SUDAFRICA','COREA DEL SUR','REP. CHECA'],
  B:['CANADA','BOSNIA','QATAR','SUIZA'],
  C:['BRASIL','MARRUECOS','HAITI','ESCOCIA'],
  D:['ESTADOS UNIDOS','PARAGUAY','AUSTRALIA','TURQUIA'],
  E:['ALEMANIA','CURAZAO','COSTA DE MARFIL','ECUADOR'],
  F:['PAISES BAJOS','JAPON','SUECIA','TUNEZ'],
  G:['BELGICA','EGIPTO','IRAN','NUEVA ZELANDA'],
  H:['ESPAÑA','CABO VERDE','ARABIA SAUDI','URUGUAY'],
  I:['FRANCIA','SENEGAL','IRAQ','NORUEGA'],
  J:['ARGENTINA','ARGELIA','AUSTRIA','JORDANIA'],
  K:['PORTUGAL','R.D.CONGO','UZBEKISTAN','COLOMBIA'],
  L:['INGLATERRA','CROACIA','GHANA','PANAMA']
};
// Orden exacto de partidos como en el Excel (jornada 1, 2 y 3)
const PARTIDOS_GRUPO={
  A:[['MEXICO','SUDAFRICA'],['COREA DEL SUR','REP. CHECA'],['REP. CHECA','SUDAFRICA'],['MEXICO','COREA DEL SUR'],['REP. CHECA','MEXICO'],['SUDAFRICA','COREA DEL SUR']],
  B:[['CANADA','BOSNIA'],['QATAR','SUIZA'],['SUIZA','BOSNIA'],['CANADA','QATAR'],['SUIZA','CANADA'],['BOSNIA','QATAR']],
  C:[['BRASIL','MARRUECOS'],['HAITI','ESCOCIA'],['ESCOCIA','MARRUECOS'],['BRASIL','HAITI'],['ESCOCIA','BRASIL'],['MARRUECOS','HAITI']],
  D:[['ESTADOS UNIDOS','PARAGUAY'],['AUSTRALIA','TURQUIA'],['TURQUIA','PARAGUAY'],['ESTADOS UNIDOS','AUSTRALIA'],['TURQUIA','ESTADOS UNIDOS'],['PARAGUAY','AUSTRALIA']],
  E:[['ALEMANIA','CURAZAO'],['COSTA DE MARFIL','ECUADOR'],['ECUADOR','CURAZAO'],['ALEMANIA','COSTA DE MARFIL'],['ECUADOR','ALEMANIA'],['CURAZAO','COSTA DE MARFIL']],
  F:[['PAISES BAJOS','JAPON'],['SUECIA','TUNEZ'],['TUNEZ','JAPON'],['PAISES BAJOS','SUECIA'],['TUNEZ','PAISES BAJOS'],['JAPON','SUECIA']],
  G:[['BELGICA','EGIPTO'],['IRAN','NUEVA ZELANDA'],['NUEVA ZELANDA','EGIPTO'],['BELGICA','IRAN'],['NUEVA ZELANDA','BELGICA'],['EGIPTO','IRAN']],
  H:[['ESPAÑA','CABO VERDE'],['ARABIA SAUDI','URUGUAY'],['URUGUAY','CABO VERDE'],['ESPAÑA','ARABIA SAUDI'],['URUGUAY','ESPAÑA'],['CABO VERDE','ARABIA SAUDI']],
  I:[['FRANCIA','SENEGAL'],['IRAQ','NORUEGA'],['NORUEGA','SENEGAL'],['FRANCIA','IRAQ'],['NORUEGA','FRANCIA'],['SENEGAL','IRAQ']],
  J:[['ARGENTINA','ARGELIA'],['AUSTRIA','JORDANIA'],['JORDANIA','ARGELIA'],['ARGENTINA','AUSTRIA'],['JORDANIA','ARGENTINA'],['ARGELIA','AUSTRIA']],
  K:[['PORTUGAL','R.D.CONGO'],['UZBEKISTAN','COLOMBIA'],['COLOMBIA','R.D.CONGO'],['PORTUGAL','UZBEKISTAN'],['COLOMBIA','PORTUGAL'],['R.D.CONGO','UZBEKISTAN']],
  L:[['INGLATERRA','CROACIA'],['GHANA','PANAMA'],['PANAMA','CROACIA'],['INGLATERRA','GHANA'],['PANAMA','INGLATERRA'],['CROACIA','GHANA']]
};
// Generar índice global de partidos
const PARTIDOS=[];
GRUPOS_ORDER.forEach(g=>{
  PARTIDOS_GRUPO[g].forEach(([loc,vis])=>PARTIDOS.push({grupo:g,local:loc,visitante:vis}));
});

// 16 cruces de dieciseisavos (8 bloques de 2 partidos)
// slot: '1:X'=primero de grupo X, '2:X'=segundo, 'T:A/B/C'=tercero a elegir
// Cada bloque agrupa 2 partidos; sus ganadores se cruzan en Octavos (ver OCT8).
const MATCH16=[
  // Bloque 1
  {id:'r01',a:'2:A',b:'2:B'},          // Partido 1
  {id:'r02',a:'1:F',b:'2:C'},          // Partido 2
  // Bloque 2
  {id:'r03',a:'1:E',b:'T:A/B/C/D/F'},  // Partido 3
  {id:'r04',a:'1:I',b:'T:C/D/F/G/H'},  // Partido 4
  // Bloque 3
  {id:'r05',a:'1:C',b:'2:F'},          // Partido 5
  {id:'r06',a:'2:E',b:'2:I'},          // Partido 6
  // Bloque 4
  {id:'r07',a:'1:A',b:'T:C/E/F/H/I'},  // Partido 7
  {id:'r08',a:'1:L',b:'T:E/H/I/J/K'},  // Partido 8
  // Bloque 5
  {id:'r09',a:'2:K',b:'2:L'},          // Partido 9
  {id:'r10',a:'1:H',b:'2:J'},          // Partido 10
  // Bloque 6
  {id:'r11',a:'1:D',b:'T:B/E/F/I/J'},  // Partido 11
  {id:'r12',a:'1:G',b:'T:A/E/H/I/J'},  // Partido 12
  // Bloque 7
  {id:'r13',a:'1:J',b:'2:H'},          // Partido 13
  {id:'r14',a:'2:D',b:'2:G'},          // Partido 14
  // Bloque 8
  {id:'r15',a:'1:B',b:'T:E/F/G/I/J'},  // Partido 15
  {id:'r16',a:'1:K',b:'T:D/E/I/J/L'},  // Partido 16
];

// Terceros posibles por cruce (clave SIN prefijo 'T:'; se le antepone al guardar)
const TERCEROS_SLOTS=[
  {key:'A/B/C/D/F', opts:['A','B','C','D','F']},
  {key:'C/D/F/G/H', opts:['C','D','F','G','H']},
  {key:'C/E/F/H/I', opts:['C','E','F','H','I']},
  {key:'E/H/I/J/K', opts:['E','H','I','J','K']},
  {key:'B/E/F/I/J', opts:['B','E','F','I','J']},
  {key:'A/E/H/I/J', opts:['A','E','H','I','J']},
  {key:'E/F/G/I/J', opts:['E','F','G','I','J']},
  {key:'D/E/I/J/L', opts:['D','E','I','J','L']},
];

const ADMIN_PASS='mundial2026';
const LS='porra2026v4';
const TODOS=Object.values(GRUPOS).flat().sort();

let S={page:'home',user:null,qt:'fase1',rt:0,participants:{},results:{},payments:{},meta:{cuota:15,locked:false}};
// Modo solo-lectura (admin viendo la quiniela de un participante) y participante visualizado
let RO=false,viewUid=null;
// ¿Quinielas bloqueadas por el administrador? (los participantes ya no pueden modificar)
function isLocked(){return !!(S.meta&&S.meta.locked);}

function sv(){}
async function ld(){
  try{
    const res=await fetch('/api/data');
    if(res.ok){
      const d=await res.json();
      S.participants=d.participants||{};
      S.results=d.results||{};
      S.payments=d.payments||{};
      S.meta=d.meta||{cuota:15,locked:false};
    }
  }catch(e){console.error('Error loading data:',e);}
}

// ── CLASIFICACIÓN DE GRUPO desde pronósticos ──
function calcGrupo(uid,grupo){
  const p=S.participants[uid];
  const teams=GRUPOS[grupo];
  const pts={},pj={};
  teams.forEach(t=>{pts[t]=0;pj[t]=0;});
  PARTIDOS.forEach((m,i)=>{
    if(m.grupo!==grupo) return;
    const v=p?.quiniela?.['m'+i];
    pj[m.local]++;pj[m.visitante]++;
    if(v==='1') pts[m.local]+=3;
    else if(v==='X'){pts[m.local]+=1;pts[m.visitante]+=1;}
    else if(v==='2') pts[m.visitante]+=3;
    else{pj[m.local]--;pj[m.visitante]--;}
  });
  return teams.map(eq=>({eq,pts:pts[eq],pj:pj[eq]})).sort((a,b)=>b.pts-a.pts);
}
function getPos(uid,pos,grupo){return calcGrupo(uid,grupo)[pos-1]?.eq||'';}

// ── SINCRONIZAR fases desde bracket ──
function syncFases(uid){
  const p=S.participants[uid];
  if(!p) return;
  if(!p.bracket) p.bracket={};
  const br=p.bracket;
  const f3=[];
  GRUPOS_ORDER.forEach(g=>{f3.push(getPos(uid,1,g));f3.push(getPos(uid,2,g));});
  TERCEROS_SLOTS.forEach(ts=>{const v=br['T:'+ts.key];if(v)f3.push(v);});
  p.f3=[...new Set(f3.filter(Boolean))];
  p.f4=MATCH16.map(m=>br['w_'+m.id]||'').filter(Boolean);
  p.f5=OCT8.map(m=>br['w_'+m.id]||'').filter(Boolean);
  p.f6=CUA4.map(m=>br['w_'+m.id]||'').filter(Boolean);
  p.f7=SEM2.map(m=>br['w_'+m.id]||'').filter(Boolean);
  p.f8=br['w_f1']||p.f8||'';
}

// ── PUNTOS ──
function calcPts(uid){
  const p=S.participants[uid],r=S.results;
  if(!p) return 0;
  syncFases(uid);
  let pts=0;
  PARTIDOS.forEach((_,i)=>{
    if(p.quiniela?.['m'+i]&&r.quiniela?.['m'+i]&&p.quiniela['m'+i]===r.quiniela['m'+i]) pts+=2;
  });
  ['esp_cv','esp_as','esp_ur'].forEach(k=>{
    if(p.spain?.[k]&&r.spain?.[k]&&p.spain[k]===r.spain[k]) pts+=10;
  });
  [{k:'f3',v:5},{k:'f4',v:10},{k:'f5',v:15},{k:'f6',v:20},{k:'f7',v:30}].forEach(({k,v})=>{
    (p[k]||[]).forEach(eq=>{if(eq&&(r[k]||[]).includes(eq))pts+=v;});
  });
  if(p.f8&&r.f8&&p.f8===r.f8) pts+=45;
  if(p.pich_esp&&r.pich_esp&&p.pich_esp.trim().toLowerCase()===r.pich_esp.trim().toLowerCase()) pts+=15;
  if(p.pich_mun&&r.pich_mun){
    const opts=(p.pich_mun||'').split(',').map(x=>x.trim().toLowerCase());
    if(opts.includes(r.pich_mun.trim().toLowerCase())) pts+=15;
  }
  return pts;
}
function getRank(){
  return Object.keys(S.participants)
    .map(uid=>({uid,nombre:S.participants[uid].nombre,pts:calcPts(uid)}))
    .sort((a,b)=>b.pts-a.pts);
}

// ── RENDER HELPERS ──
function slotLabel(s){const[t,v]=s.split(':');return t==='1'?`1º Gr.${v}`:t==='2'?`2º Gr.${v}`:`3º (${v})`;}
function slotTeam(uid,s){
  const[t,v]=s.split(':');
  const p=S.participants[uid];
  if(t==='1') return getPos(uid,1,v);
  if(t==='2') return getPos(uid,2,v);
  return p?.bracket?.['T:'+v]||'';
}

// ── STANDINGS TABLE ──
function standingsHTML(rows){
  let h=`<table class="standings"><thead><tr>
    <th class="left" style="width:18px">Pos</th>
    <th class="left">Equipo</th>
    <th>PJ</th><th>Pts</th>
  </tr></thead><tbody>`;
  rows.forEach((r,i)=>{

function setWinnerRound(id,a,b){
  if(!a||!b) return;

  br['w_'+id]=cur===a?b:cur===b?'':a;

function clearDownstream(br,changedId){
  [...OCT8,...CUA4,...SEM2,...FIN1].forEach(m=>{
    if(m.a===changedId||m.b===changedId){
      if(br['w_'+m.id]){delete br['w_'+m.id];clearDownstream(br,m.id);}
    }

}

// ── Admin bracket actions ──
function getAdminPos(pos,grupo){
  const r=S.results;
  const teams=GRUPOS[grupo];
  const pts={};teams.forEach(t=>pts[t]=0);
  PARTIDOS.forEach((m,i)=>{
    if(m.grupo!==grupo) return;
    const v=r.quiniela?.['m'+i];
    if(v==='1') pts[m.local]+=3;
    else if(v==='X'){pts[m.local]+=1;pts[m.visitante]+=1;}
    else if(v==='2') pts[m.visitante]+=3;
  });
  return teams.slice().sort((a,b)=>pts[b]-pts[a])[pos-1]||'';
}
function calcGrupoAdmin(grupo){
  const r=S.results;
  const teams=GRUPOS[grupo];
  const pts={},pj={};teams.forEach(t=>{pts[t]=0;pj[t]=0;});
  PARTIDOS.forEach((m,i)=>{
    if(m.grupo!==grupo) return;
    const v=r.quiniela?.['m'+i];
    pj[m.local]++;pj[m.visitante]++;
    if(v==='1') pts[m.local]+=3;
    else if(v==='X'){pts[m.local]+=1;pts[m.visitante]+=1;}
    else if(v==='2') pts[m.visitante]+=3;
    else{pj[m.local]--;pj[m.visitante]--;}
  });
  return teams.map(eq=>({eq,pts:pts[eq],pj:pj[eq]})).sort((a,b)=>b.pts-a.pts);
}
function getAdminSlot(s,bracket){
  const[t,v]=s.split(':');
  if(t==='1') return getAdminPos(1,v);
  if(t==='2') return getAdminPos(2,v);
  return bracket?.['T:'+v]||'';
}
function setAdminQ(i,v){
  if(!S.results.quiniela) S.results.quiniela={};
  const cur=S.results.quiniela['m'+i]||'';
  const nv=cur===v?'':v; // volver a pulsar la opción seleccionada la deselecciona
  if(nv) S.results.quiniela['m'+i]=nv; else delete S.results.quiniela['m'+i];
  document.querySelectorAll('[data-mi="'+i+'"]').forEach(b=>b.classList.toggle('sel',!!nv&&b.dataset.v===nv));
  const g=PARTIDOS[i].grupo;
  const el=document.getElementById('st_adm_'+g);
  if(el) el.innerHTML=standingsHTML(calcGrupoAdmin(g));
}
function setAdminTercero(bkey,val){
  if(!S.results.bracket) S.results.bracket={};
  S.results.bracket[bkey]=val;
  syncAdminFases();renderAdminRes();
}
function setAdminWinner(id,a,b){
  if(!a||!b) return;
  if(!S.results.bracket) S.results.bracket={};
  const br=S.results.bracket;
  const cur=br['w_'+id]||'';
  br['w_'+id]=cur===a?b:cur===b?'':a;
  clearDownstream(br,id);
  syncAdminFases();renderAdminRes();
}
function setAdminWinnerRound(id,a,b){
  if(!a||!b) return;
  if(!S.results.bracket) S.results.bracket={};
  const br=S.results.bracket;
  const cur=br['w_'+id]||'';
  br['w_'+id]=cur===a?b:cur===b?'':a;
  clearDownstream(br,id);
  if(id==='f1') S.results.f8=br['w_f1']||'';
  syncAdminFases();renderAdminRes();
}
function setAdminCampeon(v){S.results.f8=v;syncAdminFases();renderAdminRes();}
function syncAdminFases(){
  const r=S.results;
  if(!r.bracket) r.bracket={};
  const br=r.bracket;
  const f3=[];
  GRUPOS_ORDER.forEach(g=>{f3.push(getAdminPos(1,g));f3.push(getAdminPos(2,g));});
  TERCEROS_SLOTS.forEach(ts=>{const v=br['T:'+ts.key];if(v)f3.push(v);});
  r.f3=[...new Set(f3.filter(Boolean))];
  r.f4=MATCH16.map(m=>br['w_'+m.id]||'').filter(Boolean);
  r.f5=OCT8.map(m=>br['w_'+m.id]||'').filter(Boolean);
  r.f6=CUA4.map(m=>br['w_'+m.id]||'').filter(Boolean);
  r.f7=SEM2.map(m=>br['w_'+m.id]||'').filter(Boolean);
  r.f8=br['w_f1']||r.f8||'';
}


function buildPichi(p){
  const showGreen=RO&&isLocked();
  const re=(S.results?.pich_esp||'').trim().toLowerCase();
  const espCorrect=showGreen&&!!(p.pich_esp||'').trim()&&!!re&&(p.pich_esp||'').trim().toLowerCase()===re;
  const rm=(S.results?.pich_mun||'').trim().toLowerCase();
  const munCorrect=showGreen&&!!rm&&(p.pich_mun||'').split(',').map(x=>x.trim().toLowerCase()).filter(Boolean).includes(rm);
  return `<div class="card"><h3 style="margin-bottom:10px">Pichichi de España — <span style="color:var(--text2);font-weight:400">15 pts</span></h3>

  <div class="card"><h3 style="margin-bottom:10px">Pichichi del Mundial — <span style="color:var(--text2);font-weight:400">15 pts</span></h3>

  <div class="form-group"><label>Dos opciones</label><input class="${munCorrect?'correct':''}" placeholder="Ej: Messi, Mbappé" value="${p.pich_mun||''}" oninput="setPi('pich_mun',this.value)" ${RO?'readonly':''}/></div></div>`;
}

function buildSave(p){

async function guardar(){
  syncFases(S.user);

  const {nombre,email,quiniela,spain,bracket,f3,f4,f5,f6,f7,f8,pich_esp,pich_mun}=p;

  }catch(e){if(el) el.innerHTML='<p class="msg-err">Error de conexión. Inténtalo de nuevo.</p>';}
}

}

      <div><div style="font-size:11px;color:var(--text2);margin-bottom:2px">🥉 3º (20%)</div><div style="font-size:20px;font-weight:700;color:var(--bronze)">${prize3}€</div></div>

  } else if(i===3){
    const r=S.results;
    c.innerHTML=`<div class="card">
    <div class="form-group"><label>Pichichi de España (15 pts)</label><input placeholder="Jugador" value="${r.pich_esp||''}" oninput="setRPi('pich_esp',this.value)"/></div>
    <div class="form-group"><label>Pichichi del Mundial (15 pts)</label><input placeholder="Jugador" value="${r.pich_mun||''}" oninput="setRPi('pich_mun',this.value)"/></div>
    <button class="btn btn-primary" style="width:100%" onclick="saveR()">💾 Guardar</button><div id="rsm"></div></div>`;
  }
}
function setRSp(k,v){if(!S.results.spain)S.results.spain={};S.results.spain[k]=v;}
function setRPi(k,v){S.results[k]=v;}
async function saveR(){syncAdminFases();const m=document.getElementById('rsm');if(m)m.innerHTML='<p class="msg-ok" style="margin-top:8px;opacity:.6">Guardando...</p>';try{const res=await fetch('/api/results',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:S.results})});if(m)m.innerHTML=res.ok?'<p class="msg-ok" style="margin-top:8px">✓ Resultados guardados</p>':'<p class="msg-err" style="margin-top:8px">Error al guardar</p>';}catch(e){if(m)m.innerHTML='<p class="msg-err" style="margin-top:8px">Error de conexión</p>';}}

async function init(){
  app.innerHTML='<div style="text-align:center;padding:60px 0;color:var(--text2)">Cargando...</div>';
  await ld();
  render();
}
init();
</script>
</body>
</html>
